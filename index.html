<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bloom</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#b5739d" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#18141a" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bloom" />
  <link rel="apple-touch-icon" href="icon-180.png" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app"></div>

  <script src="weekContent.js"></script>
  <script src="foodDatabase.js"></script>
  <script src="logOptions.js"></script>
  <script src="symptomRelief.js"></script>
  <script src="listTemplates.js"></script>
  <script src="gestational.js"></script>
  <script src="charts.js"></script>
  <script src="db.js"></script>
  <script src="birthPlan.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('sw.js');
          window.__bloomSW = reg;

          // Force an update check now, and hourly while the app stays open.
          reg.update().catch(() => {});
          setInterval(() => reg.update().catch(() => {}), 60 * 60 * 1000);

          const hadController = !!navigator.serviceWorker.controller;
          let banner = false;
          function showUpdateBanner() {
            if (banner) return;
            banner = true;
            const bar = document.createElement('div');
            bar.className = 'update-banner';
            const msg = document.createElement('span');
            msg.textContent = 'A new version of Bloom is ready.';
            const btn = document.createElement('button');
            btn.textContent = 'Refresh';
            btn.onclick = () => location.reload();
            bar.appendChild(msg);
            bar.appendChild(btn);
            document.body.appendChild(bar);
          }

          // A newly installed worker while one already controls the page = update.
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                showUpdateBanner();
              }
            });
          });
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (hadController) showUpdateBanner();
          });
        } catch (e) {
          /* offline or unsupported — app still works */
        }
      });
    }
  </script>
</body>
</html>
